<!DOCTYPE html>
<html>
<head>
    <title>Live Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

<h2>Live Dashboard</h2>

<div>
    <h3>PLC: <span id="plc">--</span></h3>
    <h3>LOGO: <span id="logo">--</span></h3>
    <small id="time"></small>
</div>

<canvas id="chart" height="150"></canvas>

<script>
let chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            { label: "PLC", data: [] },
            { label: "LOGO", data: [] }
        ]
    }
});

async function update() {
    let res = await fetch("/api/live");
    let data = await res.json();

    document.getElementById("plc").innerText = data.plc;
    document.getElementById("logo").innerText = data.logo;
    document.getElementById("time").innerText = data.time;

    chart.data.labels = data.hist_plc.map((_, i) => i);
    chart.data.datasets[0].data = data.hist_plc;
    chart.data.datasets[1].data = data.hist_logo;

    chart.update();
}

setInterval(update, 2000);
update();
</script>

</body>
</html>
